<div class="page-enter">
  <div class="page-header flex justify-between items-center">
    <div>
      <h1 class="page-title">Notifications</h1>
      <p class="page-subtitle">
        {{ unreadCount > 0 ? unreadCount + " unread" : "All caught up!" }}
      </p>
    </div>
    <div class="flex gap-8">
      <button class="btn btn-ghost btn-sm" (click)="toggleUnreadOnly()">
        {{ unreadOnly ? "☑ Unread only" : "☐ All" }}
      </button>
      <button
        *ngIf="unreadCount > 0"
        class="btn btn-ghost btn-sm"
        (click)="markAllRead()"
      >
        ✓ Mark all read
      </button>
    </div>
  </div>

  <!-- Loading skeletons -->
  <div *ngIf="loading" class="notif-list">
    <div *ngFor="let n of [1, 2, 3, 4, 5]" class="notif-skeleton">
      <div
        class="skeleton"
        style="width: 40px; height: 40px; border-radius: 50%"
      ></div>
      <div style="flex: 1; display: flex; flex-direction: column; gap: 8px">
        <div class="skeleton" style="width: 50%; height: 14px"></div>
        <div class="skeleton" style="width: 80%; height: 11px"></div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && notifications.length === 0" class="empty-box">
    <div style="font-size: 3rem; margin-bottom: 12px">🔔</div>
    <p
      style="
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 600;
      "
    >
      No notifications
    </p>
    <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 4px">
      You're all caught up!
    </p>
  </div>

  <!-- Notifications list -->
  <div *ngIf="!loading && notifications.length > 0" class="notif-list">
    <div
      *ngFor="let n of notifications"
      class="notif-item"
      [class.unread]="!n.isRead"
      (click)="read(n)"
    >
      <div [class]="iconClass(n)">{{ icon(n) }}</div>
      <div class="notif-body">
        <p class="notif-title">{{ n.title }}</p>
        <p class="notif-message">{{ n.message }}</p>
        <p class="notif-time">{{ n.createdAt | date: "MMM d, y · h:mm a" }}</p>
      </div>
      <div class="notif-right">
        <span *ngIf="!n.isRead" class="unread-dot"></span>
        <button
          class="btn-icon delete-btn"
          (click)="remove(n, $event)"
          title="Delete"
        >
          ✕
        </button>
      </div>
    </div>
  </div>
</div>
